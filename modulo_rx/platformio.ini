[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_deps =
    bblanchon/ArduinoJson@^6.21
    adafruit/Adafruit NeoPixel@^1.12.0
monitor_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DMY_CHANNEL_ID=1
    ; ↑ Cambiare a 2 per secondo modulo RX
build_src_filter = +<*> -<.git/> -<.svn/>