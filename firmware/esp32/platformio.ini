[platformio]
test_dir = ../../tests/firmware

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_deps =
    lvgl/lvgl@^8.3
    ESP Async WebServer@^1.2.4
    bblanchon/ArduinoJson@^6.21
    adafruit/Adafruit NeoPixel@^1.12.0
    lovyan03/LovyanGFX@^1.1.16
monitor_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_ESP_DSP_MAX_FFT_SIZE=512
    -DUSE_LOVYAN_GFX=1
    -DLV_CONF_SKIP
    -DFIRMWARE_VERSION=\"2.0.0\"
    -DFIRMWARE_ROLE=\"master\"

[env:native]
platform = native
lib_deps =
    bblanchon/ArduinoJson@^6.21
    throwtheswitch/Unity@^2.6.1
test_build_src = no