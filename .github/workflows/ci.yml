name: CI Tests

on:
  push:
    branches: [main, 'copilot/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-firmware:
    name: Firmware Build (ESP32-S3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build ESP32-S3 firmware
        run: cd firmware/esp32 && pio run -e esp32s3

  build-firmware-slave:
    name: Firmware Slave Build (ESP32-S3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build ESP32-S3 slave firmware
        run: cd firmware/esp32_slave && pio run -e esp32s3

  test-firmware:
    name: Firmware Unit Tests (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install platformio
      - name: Run native unit tests
        run: cd firmware/esp32 && pio test -e native

  build-modulo-rx:
    name: Build modulo_rx
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build modulo_rx
        run: |
          if [ -d "modulo_rx" ]; then
            cd modulo_rx
            pio pkg install
            pio run -e esp32s3
          else
            echo "⚠️  modulo_rx directory not found - skipping build (expected on main branch)"
            exit 0
          fi
