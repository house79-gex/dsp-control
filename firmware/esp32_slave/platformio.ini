[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_deps =
    bblanchon/ArduinoJson@^6.21
    espressif/esp-dsp@^1.3.2
    esphome/ESP32-audioI2S@^2.0.7
monitor_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_ESP_DSP_MAX_FFT_SIZE=512
    -DFIRMWARE_VERSION=\"2.0.0\"
    -DFIRMWARE_ROLE=\"slave\"
    -DCORE_DEBUG_LEVEL=3
upload_speed = 921600
